name: Update README on push

# Trigger the Copilot coding agent to review and update README.md
# after every push to the default branch.
on:
  push:
    branches:
      - main
      - master

jobs:
  trigger-readme-agent:
    runs-on: ubuntu-latest

    permissions:
      # Required to create issues that invoke the Copilot coding agent
      issues: write

    steps:
      - name: Validate PAT secret is configured
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::The 'PAT' repository secret is not configured."
            echo "::error::A Personal Access Token (PAT) with 'repo' scope is required to assign"
            echo "::error::the Copilot coding agent to issues. GITHUB_TOKEN cannot be used for this."
            echo "::error::Create a PAT at https://github.com/settings/tokens and store it as a"
            echo "::error::repository secret named 'PAT' (Settings > Secrets and variables > Actions)."
            exit 1
          fi
        env:
          GH_PAT: ${{ secrets.PAT }}

      - name: Open Copilot task to update README
        env:
          # A Personal Access Token (PAT) is required to assign the Copilot
          # coding agent to an issue. GitHub App installation tokens
          # (GITHUB_TOKEN) do not support agent assignment.
          # The PAT must belong to a user with write access to this repository.
          # Use a fine-grained PAT (Issues: read/write) or a classic PAT with
          # 'repo' scope. Rotate the PAT regularly and store it as a
          # repository secret named 'PAT'.
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "docs: update README after push to ${GITHUB_REF_NAME} (${GITHUB_SHA::7})" \
            --body "$(cat <<'EOF'
          A new commit was pushed to **${GITHUB_REF_NAME}** (commit \`${GITHUB_SHA::7}\`).

          Please act as a documentation specialist and update \`README.md\` to reflect any relevant changes:

          - Review the recent changes in the repository.
          - Keep the project description accurate and up to date.
          - Ensure these sections are present and well-structured:
            - **Overview** – what the project does
            - **Installation** – how to set it up
            - **Usage** – how to run or use it
            - **Contributing** – how to contribute
          - Add or refresh badges and navigation links.
          - Use relative links for all internal documentation references.
          EOF
          )" \
            --assignee "copilot-swe-agent"
